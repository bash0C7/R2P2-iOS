name: TiltSynth
options:
  bundleIdPrefix: com.bash0c7.picoruby
  deploymentTarget:
    iOS: "17.0"
packages:
  # The Darwin (CoreMotion) backend. Its pmotion_* C symbols resolve the
  # undefined references in the staged libmruby.a at app link.
  PicoMotionDarwin:
    path: picoruby-iphone-motion/ports/darwin/ext-motion
  # The Darwin (AVAudioEngine) backend. Its psynth_* C symbols resolve the
  # undefined references in the staged libmruby.a at app link.
  PicoSynthDarwin:
    path: picoruby-iphone-synth/ports/darwin/ext-synth
targets:
  TiltSynth:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: app.rb
        buildPhase: resources
      - path: ../../../bridge
        includes:
          - "picoruby_bridge.c"
          - "picoruby_bridge.h"
          - "task_hal_ios.c"
    dependencies:
      - package: PicoMotionDarwin
        embed: true
      - package: PicoSynthDarwin
        embed: true
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: Sources/TiltSynth-Bridging-Header.h
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "PICORB_ALLOC_ESTALLOC"
          - "PICORB_ALLOC_ALIGN=8"
          - "MRB_NO_BOXING"
          - "MRB_INT64"
          - "MRB_UTF8_STRING"
          - "PICORB_PLATFORM_DARWIN"
          - "MRB_TICK_UNIT=4"
          - "MRB_TIMESLICE_TICK_COUNT=3"
          - "MRB_USE_TASK_SCHEDULER=1"
          - "MRB_USE_VM_SWITCH_DISPATCH=1"
          - "MRB_CONSTRAINED_BASELINE_PROFILE=1"
          - "MRB_HEAP_PAGE_SIZE=128"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../../../vendor/picoruby/include"
          - "$(SRCROOT)/../../../vendor/picoruby/mrbgems/mruby-compiler/include"
          - "$(SRCROOT)/../../../vendor/picoruby/mrbgems/mruby-compiler/lib/prism/include"
          - "$(SRCROOT)/../../../vendor/picoruby/mrbgems/picoruby-mruby/lib/mruby/include"
          - "$(SRCROOT)/../../../vendor/picoruby/mrbgems/picoruby-mruby/include"
          - "$(SRCROOT)/../../../build/ios-tiltsynth-sim/include"
          - "$(SRCROOT)/../../../build/ios-tiltsynth-device/include"
          - "$(SRCROOT)/../../../vendor/picoruby/mrbgems/picoruby-mruby/lib/mruby/mrbgems/mruby-task/include"
          - "$(SRCROOT)/../../../bridge"
        LIBRARY_SEARCH_PATHS:
          - "$(SRCROOT)/Vendor/lib"
        OTHER_LDFLAGS:
          - "-lmruby"
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.bash0c7.picoruby.TiltSynth
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: YOUR_TEAM_ID  # replace with your Apple Team ID (Xcode > Settings > Accounts) for device builds
